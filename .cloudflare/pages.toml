# Cloudflare Pages 构建配置
# 文档: https://developers.cloudflare.com/pages/configuration/build-configuration/

# 构建命令（已包含 fetch-content + vite build）
command = "pnpm install --frozen-lockfile && pnpm run build"

# 构建输出目录
output_directory = "dist"

# 根目录（相对于仓库根）
root_directory = "/"

# 构建时环境变量（在 Cloudflare Dashboard → Settings → Environment variables 中配置）
# 以下变量有默认值，无需额外配置即可工作：
#   CONTENT_BASE_URL = "https://static.easte.cc"   # R2 静态资源地址
#   CONTENT_API_URL  = "https://admin.easte.cc/api" # 后端 API 地址
#
# 如需修改，在 Cloudflare Pages 项目的 Environment variables 中覆盖即可。
