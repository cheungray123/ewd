<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="author" content="東风" />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#0a0a1a" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f5f3ee" media="(prefers-color-scheme: light)" />
		<!-- 移动端优化 -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="東风" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="format-detection" content="telephone=no" />
		<!-- Content Security Policy - 防止混合内容警告 -->
		<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
		<link rel="manifest" href="/manifest.json" />
		<!-- 本地字体配置 -->
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<!-- Noto Sans SC 从 Google Fonts CDN 加载 -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
		<!-- 防闪烁：在 CSS 渲染前从 localStorage 读取主题并设置 data-theme -->
		<script>
			(function () {
				try {
					var t = localStorage.getItem('df-theme');
					if (t !== 'light' && t !== 'dark') {
						t = window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
					}
					document.documentElement.setAttribute('data-theme', t);
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
